# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "6d0afc812e1d6583c619c0a1c2e65c0d"
name = "upsell-tool"
application_url = "https://example.com"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[webhooks]
api_version = "2026-07"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# read_products: Admin API access, used by the rule editor's resource picker labels.
# write_discounts: required to create/update the automatic discount backed by
# the upsell-discount Function (Settings -> Activate discount).
# unauthenticated_read_*: Storefront API access, used by the App Proxy to resolve
# live product/variant/price/collection data for active rules.
# write_products is intentionally NOT included here — it's only needed
# temporarily for one-off demo-data seeding scripts, never at runtime.
scopes = "read_products,write_discounts,unauthenticated_read_product_listings,unauthenticated_read_collection_listings"
optional_scopes = [ ]
use_legacy_install_flow = false

[app_proxy]
url = "https://example.com/apps/upsell"
subpath = "upsell"
prefix = "apps"

[auth]
redirect_urls = [ ]
