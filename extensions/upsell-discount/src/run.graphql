query RunInput {
  discountNode {
    metafield(namespace: "$app:upsell-discount", key: "function-configuration") {
      value
    }
  }
  cart {
    lines {
      id
      attribute(key: "_upsell_rule_id") {
        value
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
        }
      }
    }
  }
}
